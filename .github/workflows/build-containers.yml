name: Build container images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: limeray

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Read project version
        id: version
        shell: pwsh
        run: |
          [xml]$props = Get-Content ./Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Directory.Build.props must contain Project/PropertyGroup/Version."
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Resolve image namespace
        id: image-namespace
        shell: bash
        run: |
          namespace="${DOCKERHUB_NAMESPACE}"
          echo "value=${namespace}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: limeray
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/hhnl.Formicae.Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.value }}/hhnl-formicae-api:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.value }}/hhnl-formicae-api:latest
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.value }}/hhnl-formicae-api:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
      - name: Build Worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/hhnl.Formicae.Worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.value }}/hhnl-formicae-worker:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.value }}/hhnl-formicae-worker:latest
            ${{ env.REGISTRY }}/${{ steps.image-namespace.outputs.value }}/hhnl-formicae-worker:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision=${{ github.sha }}
