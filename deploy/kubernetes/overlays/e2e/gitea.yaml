apiVersion: v1
kind: Service
metadata:
  name: formicae-gitea
  labels:
    app.kubernetes.io/name: formicae-gitea
spec:
  selector:
    app.kubernetes.io/name: formicae-gitea
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: formicae-gitea
  labels:
    app.kubernetes.io/name: formicae-gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: formicae-gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/name: formicae-gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.22.6-rootless
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GITEA__server__ROOT_URL
              value: http://formicae-gitea:3000/
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__database__DB_TYPE
              value: sqlite3
          volumeMounts:
            - name: data
              mountPath: /var/lib/gitea
      volumes:
        - name: data
          emptyDir: {}
