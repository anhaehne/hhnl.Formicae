apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: formicae-agent-runner
  labels:
    app.kubernetes.io/name: hhnl-formicae
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete", "get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: formicae-agent-runner
  labels:
    app.kubernetes.io/name: hhnl-formicae
subjects:
  - kind: ServiceAccount
    name: formicae
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: formicae-agent-runner
