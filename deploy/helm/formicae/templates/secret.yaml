{{- if .Values.secrets.create -}}
{{- $secretName := printf "%s-secrets" (include "formicae.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $postgresPassword := .Values.secrets.postgresPassword -}}
{{- if and (not $postgresPassword) $existingSecret (index $existingSecret.data "POSTGRES_PASSWORD") -}}
{{- $postgresPassword = index $existingSecret.data "POSTGRES_PASSWORD" | b64dec -}}
{{- end -}}
{{- if and (not $postgresPassword) .Values.postgres.enabled -}}
{{- $postgresPassword = randAlphaNum 32 -}}
{{- end -}}
{{- $connectionString := .Values.secrets.connectionString -}}
{{- if and $connectionString .Values.postgres.enabled -}}
{{- fail "Set postgres.enabled=false when secrets.connectionString points to an external PostgreSQL instance." -}}
{{- end -}}
{{- if and (not $connectionString) .Values.postgres.enabled -}}
{{- $connectionString = printf "Host=%s-postgres;Port=5432;Database=%s;Username=%s;Password=%s" (include "formicae.fullname" .) .Values.secrets.postgresDb .Values.secrets.postgresUser $postgresPassword -}}
{{- end -}}
{{- if not $connectionString -}}
{{- fail "secrets.connectionString is required when postgres.enabled=false." -}}
{{- end -}}
{{- if and (eq (toString .Values.config.authEnabled | lower) "true") (or (not .Values.config.authGitHubClientId) (not .Values.secrets.authGitHubClientSecret)) -}}
{{- fail "config.authGitHubClientId and secrets.authGitHubClientSecret are required when config.authEnabled=true." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "formicae.labels" . | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__Formicae: {{ $connectionString | quote }}
  GitHubWebhooks__Secret: {{ .Values.secrets.githubWebhookSecret | quote }}
  Auth__GitHub__ClientSecret: {{ .Values.secrets.authGitHubClientSecret | quote }}
  Auth__InviteCodes__0: {{ .Values.secrets.authInviteCodes | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_DB: {{ .Values.secrets.postgresDb | quote }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ $postgresPassword | quote }}
  {{- end }}
{{- end -}}
