apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "formicae.fullname" . }}-config
  labels:
    {{- include "formicae.labels" . | nindent 4 }}
data:
  ASPNETCORE_HTTP_PORTS: {{ .Values.config.aspnetcoreHttpPorts | quote }}
  UseFakeAdapters: {{ .Values.config.useFakeAdapters | quote }}
  PersistenceMode: {{ .Values.config.persistenceMode | quote }}
  WorkItemMode: {{ .Values.config.workItemMode | quote }}
  SourceControlMode: {{ .Values.config.sourceControlMode | quote }}
  AgentMode: {{ .Values.config.agentMode | quote }}
  OpenHands__AuthMethod: {{ .Values.config.openHandsAuthMethod | quote }}
  OpenHands__Provider: {{ .Values.config.openHandsProvider | quote }}
  OpenHands__DefaultModel: {{ .Values.config.openHandsDefaultModel | quote }}
  OpenHands__EndpointUrl: {{ .Values.config.openHandsEndpointUrl | quote }}
  WorkflowDiscovery__Enabled: {{ .Values.config.workflowDiscoveryEnabled | quote }}
  WorkflowDiscovery__RepositoryUrl: {{ .Values.config.workflowDiscoveryRepositoryUrl | quote }}
  WorkflowDiscovery__BaseBranch: {{ .Values.config.workflowDiscoveryBaseBranch | quote }}
  WorkflowDiscovery__Model: {{ .Values.config.workflowDiscoveryModel | quote }}
  ManagementAuth__Enabled: {{ .Values.config.managementAuthEnabled | quote }}
  ManagementAuth__InviteCodeExpiration: {{ .Values.config.managementAuthInviteCodeExpiration | quote }}
  ManagementAuth__BypassForLocalDevelopment: {{ .Values.config.managementAuthBypassForLocalDevelopment | quote }}
  OpenHands__LlmApiKeySecretName: {{ .Values.config.openHandsLlmApiKeySecretName | quote }}
  OpenHands__Shell: {{ .Values.config.openHandsShell | quote }}
  OpenHands__BootstrapCommand: {{ .Values.config.openHandsBootstrapCommand | quote }}
  OpenHands__Command: {{ .Values.config.openHandsCommand | quote }}
  OpenHands__CodexSubscriptionImage: {{ .Values.config.openHandsCodexSubscriptionImage | quote }}
  OpenHands__CodexSubscriptionBootstrapCommand: {{ .Values.config.openHandsCodexSubscriptionBootstrapCommand | quote }}
  OpenHands__CodexSubscriptionCommand: {{ .Values.config.openHandsCodexSubscriptionCommand | quote }}
  OpenHands__CodexSubscriptionLoginCommand: {{ .Values.config.openHandsCodexSubscriptionLoginCommand | quote }}
  KubernetesJobs__Namespace: {{ default .Release.Namespace .Values.config.kubernetesJobsNamespace | quote }}
  KubernetesJobs__Image: {{ default (include "formicae.image" (dict "root" . "repository" .Values.worker.image.repository)) .Values.config.kubernetesJobsImage | quote }}
  KubernetesJobs__WorkspaceVolumeClaim: {{ .Values.config.kubernetesJobsWorkspaceVolumeClaim | quote }}
  KubernetesJobs__TimeoutSeconds: {{ .Values.config.kubernetesJobsTimeoutSeconds | quote }}
  KubernetesJobs__PollIntervalSeconds: {{ .Values.config.kubernetesJobsPollIntervalSeconds | quote }}
  KubernetesJobs__DeleteFinishedJobs: {{ .Values.config.kubernetesJobsDeleteFinishedJobs | quote }}
  KubernetesJobs__WorkerCallbackUrl: {{ default (printf "http://%s-api.%s.svc.cluster.local/api/worker/agent-messages" (include "formicae.fullname" .) .Release.Namespace) .Values.config.kubernetesJobsWorkerCallbackUrl | quote }}
  KubernetesJobs__LlmApiKeySecretName: {{ .Values.config.openHandsLlmApiKeySecretName | quote }}
  KubernetesJobs__CodexAuthSecretName: {{ ternary .Values.agentJobs.codexAuth.secretName "" .Values.agentJobs.codexAuth.enabled | quote }}
  KubernetesJobs__CodexAuthSecretKey: {{ .Values.agentJobs.codexAuth.secretKey | quote }}
  KubernetesJobs__CodexAuthMountPath: {{ .Values.agentJobs.codexAuth.mountPath | quote }}
