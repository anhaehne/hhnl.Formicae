replicaCount: 1

image:
  registry: ghcr.io
  repositoryPrefix: anhaehne
  tag: "0.1.0"
  pullPolicy: IfNotPresent

api:
  image:
    repository: hhnl-formicae-api
  service:
    type: ClusterIP
    port: 80
    targetPort: http
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  image:
    repository: hhnl-formicae-worker
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  codexAuth:
    enabled: false
    secretName: formicae-codex-auth
    secretKey: auth.json
    mountPath: /root/.codex
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

config:
  aspnetcoreHttpPorts: "8080"
  useFakeAdapters: "false"
  persistenceMode: "Postgres"
  workItemMode: "GitHub"
  sourceControlMode: "GitHub"
  agentMode: "OpenHands"
  openHandsAuthMethod: "ApiKey"
  openHandsDefaultModel: "openhands/claude-sonnet-4"
  openHandsLlmApiKeySecretName: "openhands-llm-api-key"
  openHandsShell: "/bin/sh"
  openHandsBootstrapCommand: 'pip install -q uv && uv tool install openhands --python 3.12 && export PATH="/root/.local/bin:$PATH"'
  openHandsCommand: 'openhands --headless --json --override-with-envs -t "$FORMICAE_TASK_PROMPT"'
  openHandsCodexSubscriptionImage: "node:22-bookworm-slim"
  openHandsCodexSubscriptionBootstrapCommand: ""
  openHandsCodexSubscriptionCommand: "npx -y @agentclientprotocol/codex-acp"
  kubernetesJobsNamespace: ""
  kubernetesJobsImage: "python:3.12-slim"
  kubernetesJobsWorkspaceVolumeClaim: "formicae-workspaces"
  kubernetesJobsTimeoutSeconds: "1800"
  kubernetesJobsPollIntervalSeconds: "5"
  kubernetesJobsDeleteFinishedJobs: "false"

secrets:
  create: true
  runtimeSecretName: "formicae-runtime-secrets"
  connectionString: ""
  postgresDb: "formicae"
  postgresUser: "formicae"
  postgresPassword: ""

postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 2Gi
  resources: {}

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

imagePullSecrets: []
