replicaCount: 1

image:
  registry: docker.io
  repositoryPrefix: limeray
  tag: "0.1.21"
  pullPolicy: IfNotPresent

api:
  image:
    repository: hhnl-formicae-api
  service:
    type: ClusterIP
    port: 80
    targetPort: http
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

agentJobs:
  codexAuth:
    enabled: false
    secretName: formicae-codex-auth
    secretKey: auth.json
    mountPath: /root/.codex

config:
  aspnetcoreHttpPorts: "8080"
  useFakeAdapters: "false"
  persistenceMode: "Postgres"
  workItemMode: "GitHub"
  sourceControlMode: "GitHub"
  agentMode: "OpenHands"
  openHandsAuthMethod: "ApiKey"
  openHandsDefaultModel: ""
  workflowDiscoveryEnabled: "true"
  workflowDiscoveryRepositoryUrl: "https://github.com/anhaehne/hhnl.Formicae"
  workflowDiscoveryBaseBranch: "main"
  workflowDiscoveryModel: ""
  openHandsLlmApiKeySecretName: "openhands-llm-api-key"
  openHandsShell: "/bin/sh"
  openHandsBootstrapCommand: 'pip install -q uv && uv tool install openhands --python 3.12 && export PATH="/root/.local/bin:$PATH"'
  openHandsCommand: 'openhands --headless --json --override-with-envs -t "$FORMICAE_TASK_PROMPT"'
  openHandsCodexSubscriptionImage: "mcr.microsoft.com/dotnet/sdk:10.0"
  openHandsCodexSubscriptionBootstrapCommand: 'apt-get update && apt-get install -y --no-install-recommends git ca-certificates curl gnupg && curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y --no-install-recommends nodejs && rm -rf /var/lib/apt/lists/*'
  openHandsCodexSubscriptionCommand: 'mkdir -p "$CODEX_HOME" /workspace && if [ -f /root/.codex/auth.json ]; then cp /root/.codex/auth.json "$CODEX_HOME/auth.json" && chmod 600 "$CODEX_HOME/auth.json"; fi && repo="${FORMICAE_REPOSITORY_URL#https://}" && if [ "$FORMICAE_TASK_KIND" = "Implement" ] || [ "$FORMICAE_TASK_KIND" = "AddressComments" ]; then if [ -z "$GITHUB_TOKEN" ]; then echo "GITHUB_TOKEN is required to push workflow changes." >&2; exit 1; fi; git clone "https://x-access-token:${GITHUB_TOKEN}@${repo}" /workspace/repo && cd /workspace/repo && git checkout "$FORMICAE_BRANCH" && git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@${repo}" && git config user.email "formicae@example.invalid" && git config user.name "Formicae Agent"; else cd /workspace; fi && codex_model_args="" && if [ -n "$FORMICAE_MODEL" ]; then codex_model_args="-m $FORMICAE_MODEL"; fi && npx -y @openai/codex exec $codex_model_args -C "$PWD" --skip-git-repo-check --json --dangerously-bypass-approvals-and-sandbox "$FORMICAE_TASK_PROMPT" && if [ "$FORMICAE_TASK_KIND" = "Implement" ] || [ "$FORMICAE_TASK_KIND" = "AddressComments" ]; then git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@${repo}" && git add -A && if git diff --cached --quiet; then echo "Codex completed without uncommitted file changes."; else commit_subject="Implement Formicae workflow ${FORMICAE_WORKFLOW_ID}" && if [ "$FORMICAE_TASK_KIND" = "AddressComments" ]; then commit_subject="Address comments for Formicae workflow ${FORMICAE_WORKFLOW_ID}"; fi && git commit -m "$commit_subject"; fi && git push origin "$FORMICAE_BRANCH"; fi'
  kubernetesJobsNamespace: ""
  kubernetesJobsImage: "python:3.12-slim"
  kubernetesJobsWorkspaceVolumeClaim: "formicae-workspaces"
  kubernetesJobsTimeoutSeconds: "1800"
  kubernetesJobsPollIntervalSeconds: "5"
  kubernetesJobsDeleteFinishedJobs: "false"

secrets:
  create: true
  runtimeSecretName: "formicae-runtime-secrets"
  connectionString: ""
  postgresDb: "formicae"
  postgresUser: "formicae"
  postgresPassword: ""
  githubWebhookSecret: ""

postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 2Gi
  resources: {}

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

imagePullSecrets: []
