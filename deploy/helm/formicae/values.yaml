replicaCount: 1

image:
  registry: docker.io
  repositoryPrefix: limeray
  tag: "0.3.37"
  pullPolicy: IfNotPresent

api:
  image:
    repository: hhnl-formicae-api
  service:
    type: ClusterIP
    port: 80
    targetPort: http
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  image:
    repository: hhnl-formicae-worker

agentJobs:
  codexAuth:
    enabled: false
    secretName: formicae-codex-auth
    secretKey: auth.json
    mountPath: /root/.codex

config:
  aspnetcoreHttpPorts: "8080"
  useFakeAdapters: "false"
  persistenceMode: "Postgres"
  workItemMode: "GitHub"
  sourceControlMode: "GitHub"
  agentMode: "OpenHands"
  openHandsAuthMethod: "ApiKey"
  openHandsProvider: ""
  openHandsDefaultModel: ""
  openHandsEndpointUrl: ""
  workflowDiscoveryEnabled: "true"
  workflowDiscoveryRepositoryUrl: "https://github.com/anhaehne/hhnl.Formicae"
  workflowDiscoveryBaseBranch: "main"
  workflowDiscoveryModel: ""
  managementAuthEnabled: "false"
  managementAuthInviteCodeExpiration: "7.00:00:00"
  managementAuthBypassForLocalDevelopment: "false"
  openHandsLlmApiKeySecretName: "openhands-llm-api-key"
  openHandsShell: "/bin/sh"
  openHandsBootstrapCommand: ""
  openHandsCommand: ""
  openHandsCodexSubscriptionImage: ""
  openHandsCodexSubscriptionBootstrapCommand: ""
  openHandsCodexSubscriptionCommand: ""
  kubernetesJobsNamespace: ""
  kubernetesJobsImage: ""
  kubernetesJobsWorkspaceVolumeClaim: "formicae-workspaces"
  kubernetesJobsTimeoutSeconds: "1800"
  kubernetesJobsPollIntervalSeconds: "5"
  kubernetesJobsDeleteFinishedJobs: "false"
  kubernetesJobsWorkerCallbackUrl: ""

secrets:
  create: true
  connectionString: ""
  postgresDb: "formicae"
  postgresUser: "formicae"
  postgresPassword: ""
  githubWebhookSecret: ""
  workerCallbackSecret: ""

postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 2Gi
  resources: {}

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

imagePullSecrets: []
